services:
  - type: web
    name: complaint-tracker
    env: node
    plan: free
    buildCommand: npm run build:all
    startCommand: npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: 20.19.0
      - key: JWT_SECRET
        generateValue: true
      - key: PORT
        value: 10000
      - key: DATA_DIR
        value: /data
    disks:
      - name: complaint-data
        mountPath: /data
        sizeGB: 1
